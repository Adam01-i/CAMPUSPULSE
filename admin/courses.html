<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cours - CampusPulse Admin</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar"><div class="brand"><span class="brand-mark">CP</span><span>CampusPulse</span></div><nav data-sidebar></nav></aside>
      <main class="main">
        <header class="topbar" data-header></header>
        <section class="content">
          <section class="panel">
            <div class="panel-header"><h2>Planning des cours</h2><button class="button" id="addCourse">Creer un cours</button></div>
            <div class="panel-body toolbar"><input id="searchInput" placeholder="Rechercher..."><input id="dateFilter" type="date"><input id="teacherFilter" placeholder="Enseignant"><input id="roomFilter" placeholder="Salle"></div>
            <div class="table-wrap"><table><thead><tr><th>Titre</th><th>Salle</th><th>Enseignant</th><th>Date</th><th>Debut</th><th>Fin</th><th>Actions</th></tr></thead><tbody id="coursesTable"></tbody></table></div>
            <div class="pagination" id="pagination"></div>
          </section>
        </section>
      </main>
    </div>
    <button class="icon-button mobile-menu" data-menu-toggle>☰</button>
    <div class="modal" id="courseModal"><div class="modal-card"><form id="courseForm"><div class="modal-header"><h2 id="courseModalTitle">Cours</h2><button type="button" class="icon-button" data-close-modal>×</button></div><div class="modal-body"><input type="hidden" id="courseId"><div class="field"><label>Titre</label><input id="title" required></div><div class="form-row"><div class="field" style="flex:1"><label>Salle</label><input id="room" required></div><div class="field" style="flex:1"><label>Enseignant</label><input id="teacher" required></div></div><div class="form-row"><div class="field" style="flex:1"><label>Date</label><input id="date" type="date" required></div><div class="field" style="flex:1"><label>Heure debut</label><input id="startTime" type="time" required></div><div class="field" style="flex:1"><label>Heure fin</label><input id="endTime" type="time" required></div></div></div><div class="modal-footer"><button type="button" class="button ghost" data-close-modal>Annuler</button><button class="button" type="submit">Enregistrer</button></div></form></div></div>
    <div data-toast-root class="toast-root"></div><div data-loader class="loader"><div class="spinner"></div></div>
    <script type="module" src="js/courses.js"></script>
  </body>
</html>
